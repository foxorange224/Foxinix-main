<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxinix YT | Buscar Video</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            background-color: #121214;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .yt-card {
            background: #000000;
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fe751f;
        }

        .yt-card h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .yt-card h1 svg {
            width: 32px;
            height: 32px;
            color: #ff0000;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #fe751f;
        }

        .btn-search {
            background: #fe751f;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
            white-space: nowrap;
        }

        .btn-search:hover {
            background: #ff8c3d;
        }

        .btn-search:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            min-height: 1.2rem;
            margin-bottom: 1rem;
            display: none;
        }

        .video-preview {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumbnail {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .video-info {
            margin-bottom: 1.5rem;
        }

        .video-info h2 {
            font-size: 1.2rem;
            margin: 0 0 0.5rem 0;
            color: #fff;
        }

        .video-info p {
            color: #aaa;
            font-size: 0.9rem;
            margin: 0;
        }

        .btn-watch {
            display: block;
            width: 100%;
            background: #fe751f;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s;
            box-sizing: border-box;
        }

        .btn-watch:hover {
            background: #ff8c3d;
        }

        .loader {
            display: none;
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #fe751f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="yt-card">
        <a href="/" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor" width="16" height="16"><path d="M182.6 137.3C170.1 124.8 149.8 124.8 137.3 137.3L9.4 265.4C3.4 271.4 0 279.5 0 288s3.4 16.6 9.4 22.6l128 128c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 320H544c17.7 0 32-14.3 32-32s-14.3-32-32-32H109.3l73.4-73.4c12.5-12.5 12.5-32.7 0-45.3z"/></svg>
            Volver
        </a>

        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path fill="currentColor" d="M581.7 188.1C575.5 164.4 556.9 145.8 533.4 139.5C490.9 128 320.1 128 320.1 128C320.1 128 149.3 128 106.7 139.5C83.2 145.8 64.7 164.4 58.4 188.1C47 231 47 320.4 47 320.4C47 320.4 47 409.8 58.4 452.7C64.7 476.3 83.2 494.2 106.7 500.5C149.3 512 320.1 512 320.1 512C320.1 512 490.9 512 533.5 500.5C557 494.2 575.5 476.3 581.8 452.7C593.2 409.8 593.2 320.4 593.2 320.4C593.2 320.4 593.2 231 581.8 188.1zM264.2 401.6L264.2 239.2L406.9 320.4L264.2 401.6z"/></svg>
            Cargar Video
        </h1>
        
        <div class="input-group">
            <input type="text" id="video-id" placeholder="ID o URL del video (ej: dQw4w9WgXcQ)">
            <button class="btn-search" id="search-btn" onclick="fetchVideoDetails()">Buscar</button>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="loader" id="loader"></div>

        <div class="video-preview" id="preview">
            <img src="" alt="Miniatura del video" class="thumbnail" id="thumb" onerror="this.src='https://img.youtube.com/vi/REPLACE/hqdefault.jpg'.replace('REPLACE', this.src.match(/\/vi\/([^/]+)\//)?.[1] || '')">
            <div class="video-info">
                <h2 id="title"></h2>
                <p id="author"></p>
            </div>
            <a href="#" class="btn-watch" id="watch-btn">Ver video</a>
        </div>
    </div>

    <script>
        function extractVideoId(input) {
            input = input.trim();
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const p of patterns) {
                const m = input.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            const el = document.getElementById('error-msg');
            el.textContent = '';
            el.style.display = 'none';
        }

        async function fetchVideoDetails() {
            const raw = document.getElementById('video-id').value;
            const id = extractVideoId(raw);
            const preview = document.getElementById('preview');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('search-btn');
            
            hideError();

            if (!id) {
                showError('Ingresa un ID de video válido o una URL de YouTube.');
                return;
            }

            preview.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;
            btn.textContent = 'Buscando...';

            try {
                const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
                if (!response.ok) throw new Error('Video no encontrado');
                
                const data = await response.json();

                const thumb = document.getElementById('thumb');
                thumb.src = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                thumb.onerror = function() {
                    this.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
                };
                document.getElementById('title').innerText = data.title;
                document.getElementById('author').innerText = `Canal: ${data.author_name}`;
                document.getElementById('watch-btn').href = `/yt/watch?v=${id}`;

                loader.style.display = 'none';
                preview.style.display = 'block';
            } catch (error) {
                loader.style.display = 'none';
                showError('No se pudo encontrar el video. Verifica que el ID sea correcto.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Buscar';
            }
        }

        document.getElementById('video-id').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideoDetails();
        });

        document.getElementById('video-id').addEventListener('input', () => {
            document.getElementById('preview').style.display = 'none';
            document.getElementById('loader').style.display = 'none';
            hideError();
        });

        const urlParams = new URLSearchParams(window.location.search);
        const videoParam = urlParams.get('v');
        if (videoParam) {
            document.getElementById('video-id').value = videoParam;
            fetchVideoDetails();
        }
    </script>
</body>
</html>
