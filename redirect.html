<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <script>(function() { var e = localStorage.getItem("foxweb_theme") || "dark"; document.documentElement.setAttribute("data-theme", e) })()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Redireccionando...</title>
    <meta name="description" content="Redireccionando a la página principal de FoxWeb...">
    <meta name="theme-color" content="#b34700">
    <link rel="icon" type="image/png" href="/assets/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="shortcut icon" href="/assets/favicon.ico">
    
    <style>
        :root {
            --primary: #b34700;
            --primary-hover: #993800;
            --primary-light: rgba(179, 71, 0, 0.08);
            --bg-body: #0a0a0a;
            --bg-card: #121212;
            --bg-tab: #1a1a1a;
            --text-main: #f0f0f0;
            --text-dim: #888;
            --text-muted: #666;
            --border: #333;
            --error: #dc3545;
            --radius-lg: 8px;
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        [data-theme=light] {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --bg-tab: #f1f3f5;
            --text-main: #212529;
            --text-dim: #6c757d;
            --border: #dee2e6;
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo img {
            width: 185px;
            height: 80px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .url {
            font-size: 0.9rem;
            color: var(--text-dim);
            word-break: break-all;
            padding: 0.75rem;
            background: var(--bg-tab);
            border-radius: var(--radius-lg);
            margin-top: 1rem;
        }

        .error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: var(--radius-lg);
        }

        .error .message {
            color: var(--error);
        }

        .usage {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
            font-family: monospace;
            background: var(--bg-tab);
            padding: 0.75rem;
            border-radius: var(--radius-lg);
        }
    </style>
</head>
<body>
    <noscript>
        <div style="background: #ff4500; color: white; padding: 15px; text-align: center; font-family: system-ui, sans-serif;">
            <strong>⚠️ JavaScript está desactivado</strong><br>
            <span style="font-size: 14px;">FoxWeb requiere JavaScript para funcionar correctamente. Por favor, habilita JavaScript en tu navegador para disfrutar de todas las funcionalidades.</span>
        </div>
    </noscript>
    <div class="container" id="loading">
        <div class="logo">
            <img src="/assets/logo.webp" alt="FoxWeb" onerror="this.style.display='none'" loading="lazy" width="120" height="120">
        </div>
        <div class="spinner"></div>
        <p class="message" id="countdown-text">Redireccionando... 5</p>
        <p class="url" id="url-display"></p>
        <img src="/assets/banner.webp" alt="Banner Publicitario" style="max-width: 100%; height: auto; margin-top: 1.5rem; border-radius: 8px;" loading="lazy" width="728" height="90">
    </div>
    
    <div class="container" id="error" style="display: none;">
        <div class="logo">
            <img src="/assets/logo.webp" alt="FoxWeb" onerror="this.style.display='none'" loading="lazy" width="120" height="120">
        </div>
        <div class="error">
            <p class="message">⚠️ Falta la URL</p>
        </div>
        <p class="usage">Uso: /redirect?url=www.ejemplo.com</p>
        <img src="/assets/banner.webp" alt="Banner Publicitario" style="max-width: 100%; height: auto; margin-top: 1.5rem; border-radius: 8px;" loading="lazy" width="728" height="90">
    </div>

    <script>
        (function() {
            // Lista blanca de dominios permitidos para redirección
            const ALLOWED_DOMAINS = [
              'mediafire.com', 'drive.google.com', 'mega.nz', 'dropbox.com',
              'github.com', 'sourceforge.net', 'gitlab.com',
              '7-zip.org', 'code.visualstudio.com', 'libreoffice.org',
              'gimp.org', 'audacityteam.org', 'obsproject.com',
              'notepad-plus-plus.org', 'krita.org', 'inkscape.org',
              'blackmagicdesign.com', 'python.org', 'git-scm.com',
              'nodejs.org', 'apachefriends.org', 'getsharex.com',
              'getgreenshot.org', 'voidtools.com', 'keepassxc.org',
              'malwarebytes.com', 'qbittorrent.org', 'filezilla-project.org',
              'etcher.balena.io', 'rufus.ie', 'cpuid.com',
              'ccleaner.com', '3dpchip.com', 'linuxmint.com',
              'archlinux.org', 'ubuntu-mate.org', 'debian.org',
              'reactos.org', 'gparted.org', 'ventoy.net',
              'store.steampowered.com', 'llaun.ch', 'optijuegos.net',
              'gofile.io', 'assault.cubers.net', 'openttd.org',
              'supertuxkart.net', 'retroarch.com'
            ];
            
            // Obtener parámetros de la URL
            const params = new URLSearchParams(window.location.search);
            let url = params.get('url');
            
            const urlDisplay = document.getElementById('url-display');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            
            if (!url) {
                // No hay URL, mostrar error
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Mostrar la URL destino
            urlDisplay.textContent = url;
            
            // Validar y sanitizar URL
            try {
                // Asegurar que la URL tenga el protocolo si no lo tiene
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                
                const urlObj = new URL(url);
                const hostname = urlObj.hostname.toLowerCase();
                
                // Verificar que el dominio esté en la lista blanca
                const isAllowed = ALLOWED_DOMAINS.some(domain => {
                  return hostname === domain || hostname.endsWith('.' + domain);
                });
                
                if (!isAllowed) {
                    // Dominio no permitido
                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                    const errorMessage = errorDiv.querySelector('.message');
                    if (errorMessage) {
                        errorMessage.innerHTML = '⚠️ dominio no permitido<br><small>Solo se permiten enlaces de sitios seguros conocidos</small>';
                    }
                    return;
                }
            } catch (e) {
                // URL inválida
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Contador regresivo de 3 segundos
            let countdown = 3;
            const messageEl = document.getElementById('countdown-text');
            
            const countdownInterval = setInterval(function() {
                messageEl.textContent = 'Redireccionando... ' + countdown;
                countdown--;
                
                if (countdown < 0) {
                    clearInterval(countdownInterval);
                    messageEl.textContent = 'Redireccionando...';
                    window.location.href = url;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
