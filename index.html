<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxWeb | Descargas</title>
    <meta name="description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb. Tu portal de descargas confiable y rápido.">
    <meta name="keywords" content="descargas, software, juegos, aplicaciones, FoxWeb">
    <link rel="canonical" href="https://foxinix.qzz.io">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/assets/icon.webp" type="image/webp">
    <link rel="apple-touch-icon" href="/assets/icon.webp">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://foxinix.qzz.io">
    <meta property="og:title" content="FoxWeb | Descargas">
    <meta property="og:description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb.">
    <meta property="og:image" content="https://foxinix.qzz.io/assets/logo.webp">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://foxinix.qzz.io">
    <meta property="twitter:title" content="FoxWeb | Descargas">
    <meta property="twitter:description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb.">
    <meta property="twitter:image" content="https://foxinix.qzz.io/assets/logo.webp">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        header a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
        }

        header p { margin: 0; }

        .nav-categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 0;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
        }

        .cat-btn:hover { background: #333; border-color: #666; }
        .cat-btn:focus-visible { outline: 2px solid #3498db; outline-offset: 2px; }

        .cat-btn.active {
            background: #d24500;
            border-color: #fff;
            color: #fff;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            padding: 0 15px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .search-bar input:focus { outline: none; border-color: #3498db; }
        .search-bar input::placeholder { color: #888; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .card:hover {
            border-color: #666;
        }

        .card:focus-visible {
            outline: 2px solid #3498db;
            outline-offset: 2px;
            transform: translateY(-2px);
        }

        .card img {
            width: 84px;
            height: 84px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 18px;
        }

        .badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }

        .badge {
            background: #333;
            color: #ddd;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .btn-download {
            background: white;
            color: black;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-download:hover { opacity: 0.9; }

        #description-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 3000;
            overflow-y: auto;
            color: white;
            font-family: sans-serif;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .desc-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        .desc-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .desc-header img { width: 100px; height: 100px; object-fit: contain; }
        .desc-header h1 { margin: 0; font-size: 2.5rem; }

        .desc-separator { height: 1px; background: #333; width: 100%; margin: 20px 0; }

        .desc-body {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ccc;
        }

        .desc-md-content {
            text-align: left;
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-top: 30px;
        }

        .desc-md-content a { color: #3498db; }

        .close-desc {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            z-index: 3100;
            font-size: 15px;
        }

        .close-desc:focus-visible { outline: 2px solid #3498db; outline-offset: 2px; }

        #notifications-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        .notif-modal-content {
            background: #111;
            border: 1px solid #333;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .notif-modal-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-modal-header h2 { margin: 0; font-size: 1.5rem; }

        .notif-list { padding: 10px; overflow-y: auto; flex-grow: 1; }

        .notif-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            transition: background 0.2s;
        }

        .notif-item:hover { background: #222; }

        .notif-item .notif-title {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #fff;
        }

        .notif-item .notif-msg {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            display: block;
        }

        .notif-item .notif-date { font-size: 0.75rem; color: #666; }

        .notif-item .btn-del {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .notif-modal-footer { padding: 15px; border-top: 1px solid #333; text-align: right; }

        .btn-clear-all {
            background: #8C0700;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification {
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 4px;
            border-left: 5px solid #fff;
            min-width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        .notification.info { border-left-color: #3498db; }
        .notification.success { border-left-color: #2ecc71; }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        body.no-scroll { overflow: hidden; }

        .skeleton { opacity: 0.3; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.6; } }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 1.1rem;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-to-top.visible { opacity: 1; pointer-events: auto; }
        .back-to-top:hover { background: #333; }
        .back-to-top:focus-visible { outline: 2px solid #3498db; outline-offset: 2px; }

        .error-banner {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .error-banner h2 { color: #e74c3c; margin-bottom: 10px; }
        .error-banner button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }
        .error-banner button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <header>
        <a href="/">
            <img src="/assets/logo.webp" alt="FoxWeb" height="80">
        </a>
        <a href="/about"><p>Acerca de</p></a>
        <button class="cat-btn" onclick="openNotificationsModal()" style="margin-left:10px;" aria-label="Notificaciones">
            <i class="fa-solid fa-bell" aria-hidden="true"></i> Notificaciones
        </button>
    </header>

    <div class="nav-categories" id="category-nav">
        <!-- Categories injected here -->
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar entre todos los elementos..." oninput="filterCards()" aria-label="Buscar elementos">
    </div>

    <div class="content-grid" id="content-grid">
        <!-- Content cards injected here -->
    </div>

    <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Volver arriba">↑</button>

    <div id="notification-container" role="alert" aria-live="polite"></div>

    <div id="notifications-modal" role="dialog" aria-modal="true" aria-label="Notificaciones">
        <div class="notif-modal-content">
            <div class="notif-modal-header">
                <h2>Notificaciones</h2>
                <button class="close-desc" style="position:static;padding:5px 10px;" onclick="closeNotificationsModal()" aria-label="Cerrar">&times;</button>
            </div>
            <div class="notif-list" id="notif-list">
                <!-- Notifications injected here -->
            </div>
            <div class="notif-modal-footer">
                <button class="btn-clear-all" onclick="clearAllNotifications()">Borrar Todas</button>
            </div>
        </div>
    </div>

    <div id="description-overlay" role="dialog" aria-modal="true" aria-label="Descripción">
        <button class="close-desc" onclick="closeDescription()" aria-label="Cerrar">Cerrar</button>
        <div class="desc-container" id="desc-container">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        const DB_URL = 'https://db.foxinix.qzz.io';
        let allData = {};
        let allNotifications = [];
        let currentCategory = '';
        let _searchQuery = '';

        const _p = ['X9f2', 'K7wQ', 'M5pZ', 'V2tRt', 'XyZ99'];

        function _b64decode(s) {
            return Uint8Array.from(atob(s), c => c.charCodeAt(0));
        }

        async function _deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 2000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-CBC', length: 256 },
                false,
                ['decrypt']
            );
        }

        async function decryptEnlace(encryptedB64) {
            try {
                const raw = _b64decode(encryptedB64);
                const salt = raw.slice(0, 16);
                const iv = raw.slice(16, 32);
                const ciphertext = raw.slice(32);
                const password = _p.join('-');
                const key = await _deriveKey(password, salt);
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv }, key, ciphertext
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                console.error('Decryption failed:', e);
                return null;
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function init() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = Array(12).fill('<div class="skeleton card"><div style="width:84px;height:84px;background:#333;border-radius:8px;margin-bottom:10px;"></div><div style="height:18px;width:80px;background:#333;border-radius:4px;margin:10px auto;"></div></div>').join('');

            try {
                const response = await fetch(`${DB_URL}/data.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allData = await response.json();

                grid.innerHTML = '';
                setupCategories();

                const hash = window.location.hash.substring(1);
                const categories = Object.keys(allData);
                const targetCat = categories.find(c => c.toLowerCase() === hash.toLowerCase());
                switchCategory(targetCat || categories[0]);

                setupNotifications();

                document.getElementById('search-input').addEventListener('input', function() {
                    _searchQuery = this.value;
                    renderCategory(currentCategory);
                });
            } catch (e) {
                console.error('Error loading data:', e);
                grid.innerHTML = `
                    <div class="error-banner">
                        <h2>Error al cargar los datos</h2>
                        <p>No se pudo conectar con la base de datos.</p>
                        <button onclick="location.reload()">Reintentar</button>
                    </div>
                `;
            }
        }

        function setupCategories() {
            const nav = document.getElementById('category-nav');
            const categories = Object.keys(allData);
            const icons = {
                programas: 'fa-solid fa-box',
                sistemas: 'fa-solid fa-desktop',
                juegos: 'fa-solid fa-gamepad',
                apks: 'fa-brands fa-android',
                extras: 'fa-solid fa-ellipsis-h'
            };

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.id = `btn-${cat}`;
                btn.innerHTML = `<i class="${icons[cat] || 'fa-solid fa-folder'}"></i> ${cat.charAt(0).toUpperCase() + cat.slice(1)} (${allData[cat].length})`;
                btn.onclick = () => { window.location.hash = cat; };
                nav.appendChild(btn);
            });
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${cat}`);
            if (activeBtn) activeBtn.classList.add('active');
            document.getElementById('search-input').value = '';
            _searchQuery = '';
            renderCategory(cat);
        }

        window.onhashchange = () => {
            const hash = window.location.hash.substring(1);
            const categories = Object.keys(allData);
            const targetCat = categories.find(c => c.toLowerCase() === hash.toLowerCase());
            if (targetCat) switchCategory(targetCat);
        };

        function renderCategory(cat) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';

            const items = allData[cat] || [];
            const filtered = _searchQuery
                ? items.filter(item =>
                    (item.name || '').toLowerCase().includes(_searchQuery.toLowerCase()) ||
                    (item.info || '').toLowerCase().includes(_searchQuery.toLowerCase()) ||
                    (item.badges || []).some(b => b.toLowerCase().includes(_searchQuery.toLowerCase()))
                  )
                : items;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">${_searchQuery ? 'Sin resultados para "' + escapeHtml(_searchQuery) + '"' : 'No hay elementos en esta categoría.'}</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0;
                card.role = 'button';
                card.setAttribute('aria-label', `Abrir ${item.name || ''}`);

                const badgesHtml = (item.badges || []).map(b => `<span class="badge">${escapeHtml(b)}</span>`).join('');
                const iconUrl = `${DB_URL}/icons/${item.id}.webp`;

                card.innerHTML = `
                    <img src="${iconUrl}" alt="${escapeHtml(item.name || '')}" loading="lazy" onerror="this.src='data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="84" height="84" fill="%23333"><rect width="84" height="84" rx="8"/><text x="42" y="48" text-anchor="middle" fill="%23666" font-size="28">?</text></svg>')}'">
                    <h3>${escapeHtml(item.name || '')}</h3>
                    <div class="badges">${badgesHtml}</div>
                `;

                card.onclick = () => openDescription(item);
                card.onkeydown = (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        openDescription(item);
                    }
                };
                grid.appendChild(card);
            });
        }

        function filterCards() {
            if (currentCategory) renderCategory(currentCategory);
        }

        let _mdCache = {};

        async function openDescription(item) {
            const overlay = document.getElementById('description-overlay');
            const container = document.getElementById('desc-container');
            const iconUrl = `${DB_URL}/icons/${item.id}.webp`;

            document.body.classList.add('no-scroll');
            overlay.style.display = 'block';
            container.innerHTML = '<div class="skeleton" style="height:200px;background:#222;border-radius:8px;"></div>';

            try {
                let mdText = 'No hay contenido adicional disponible.';
                if (_mdCache[item.id] !== undefined) {
                    mdText = _mdCache[item.id];
                } else {
                    const mdResponse = await fetch(`${DB_URL}/mds/${item.id}.md`);
                    if (mdResponse.ok) {
                        mdText = await mdResponse.text();
                        _mdCache[item.id] = mdText;
                    } else {
                        _mdCache[item.id] = mdText;
                    }
                }

                const link = item.enlace || '';
                const safeLink = escapeHtml(link);

                let renderedMd = mdText.replace(/\[boton de descarga,\s*color=([^,]+),\s*icono=([^,]+),\s*enlace=([^,]+),\s*title="([^"]+)"\]/g, (match, color, icon, linkUrl, title) => {
                    const safeUrl = escapeHtml(linkUrl);
                    const safeTitle = escapeHtml(title);
                    const safeColor = escapeHtml(color);
                    const safeIcon = escapeHtml(icon);
                    return `<a href="${safeUrl}" style="background-color:${safeColor};color:white;padding:10px 20px;border-radius:5px;text-decoration:none;display:inline-flex;align-items:center;gap:10px;margin:10px 0;font-weight:bold;" target="_blank" rel="noopener"><i class="${safeIcon}"></i> ${safeTitle}</a>`;
                });

                function renderInline(text) {
                    return text
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.+?)\*/g, '<em>$1</em>')
                        .replace(/`(.+?)`/g, '<code>$1</code>');
                }

                let lines = renderedMd.split('\n');
                let html = '';
                let inList = false;
                let listTag = '';

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];

                    if (/^#### (.+)/.test(line)) {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        html += `<h4>${renderInline(line.match(/^#### (.+)/)[1])}</h4>`;
                        continue;
                    }
                    if (/^### (.+)/.test(line)) {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        html += `<h3>${renderInline(line.match(/^### (.+)/)[1])}</h3>`;
                        continue;
                    }
                    if (/^## (.+)/.test(line)) {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        html += `<h2>${renderInline(line.match(/^## (.+)/)[1])}</h2>`;
                        continue;
                    }
                    if (/^# (.+)/.test(line)) {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        html += `<h1>${renderInline(line.match(/^# (.+)/)[1])}</h1>`;
                        continue;
                    }
                    if (/^---+\s*$/.test(line)) {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        html += '<hr>';
                        continue;
                    }
                    if (/^\d+\. (.+)/.test(line)) {
                        if (inList && listTag !== 'ol') { html += `</${listTag}>`; inList = false; }
                        if (!inList) { html += '<ol>'; inList = true; listTag = 'ol'; }
                        html += `<li>${renderInline(line.match(/^\d+\. (.+)/)[1])}</li>`;
                        continue;
                    }
                    if (/^[-*] (.+)/.test(line)) {
                        if (inList && listTag !== 'ul') { html += `</${listTag}>`; inList = false; }
                        if (!inList) { html += '<ul>'; inList = true; listTag = 'ul'; }
                        html += `<li>${renderInline(line.match(/^[-*] (.+)/)[1])}</li>`;
                        continue;
                    }
                    if (line.trim() === '') {
                        if (inList) { html += `</${listTag}>`; inList = false; }
                        continue;
                    }
                    if (inList) { html += `</${listTag}>`; inList = false; }
                    html += `<p>${renderInline(line)}</p>`;
                }

                if (inList) html += `</${listTag}>`;
                renderedMd = html;

                const hasDownload = safeLink && safeLink !== '#';
                const downloadButton = hasDownload
                    ? `<button type="button" class="btn-download" onclick="handleDownload(event,'${safeLink}')" style="font-size:1.2rem;padding:15px 30px;">Descargar ahora</button>`
                    : '';

                const safeInfo = escapeHtml(item.info || '');

                container.innerHTML = `
                    <div class="desc-header">
                        <img src="${iconUrl}" alt="${escapeHtml(item.name || '')}" onerror="this.style.display='none'">
                        <h1>${escapeHtml(item.name || '')}</h1>
                    </div>
                    <div class="desc-separator"></div>
                    <div class="desc-body">${safeInfo}</div>
                    ${downloadButton}
                    <div class="desc-md-content">${renderedMd}</div>
                `;
            } catch (e) {
                console.error('Error loading description:', e);
                container.innerHTML = '<div class="error-banner"><h2>Error</h2><p>No se pudo cargar la descripción.</p></div>';
            }
        }

        function closeDescription() {
            const overlay = document.getElementById('description-overlay');
            overlay.style.animation = 'fadeOut 0.15s ease-out';
            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.style.animation = '';
                document.body.classList.remove('no-scroll');
            }, 150);
        }

        async function handleDownload(e, enlace) {
            e.preventDefault();
            if (!enlace || enlace === '#') return;
            if (enlace.startsWith('http://') || enlace.startsWith('https://')) {
                window.open(enlace, '_blank');
                return;
            }
            const decrypted = await decryptEnlace(enlace);
            if (decrypted) {
                window.open(decrypted, '_blank');
            } else {
                showToast('Error al desencriptar el enlace', 'error');
            }
        }

        function showToast(msg, type) {
            const container = document.getElementById('notification-container');
            const div = document.createElement('div');
            div.className = `notification ${type === 'error' ? 'info' : 'success'}`;
            div.innerHTML = `<strong>${msg}</strong>`;
            container.appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.5s'; setTimeout(() => div.remove(), 500); }, 4000);
        }

        async function setupNotifications() {
            try {
                const response = await fetch(`${DB_URL}/notifications.json`);
                if (!response.ok) return;
                const data = await response.json();
                allNotifications = data.notifications || [];

                const isNewUser = !localStorage.getItem('fw_visited');
                localStorage.setItem('fw_visited', '1');

                const seenNotifs = JSON.parse(localStorage.getItem('seen_notifications') || '[]');
                const activeNotifs = getActiveNotifications();
                const newNotifs = activeNotifs.filter(n =>
                    !seenNotifs.includes(n.id) &&
                    (isNewUser ? n.forNewUsers : n.forOldUsers)
                );

                newNotifs.forEach((notif, index) => {
                    setTimeout(() => {
                        showNotification(notif);
                        markAsSeen(notif.id);
                    }, index * 3000);
                });
            } catch (e) {
                console.error('Error loading notifications:', e);
            }
        }

        function getActiveNotifications() {
            const deletedNotifs = JSON.parse(localStorage.getItem('deleted_notifications') || '[]');
            return allNotifications.filter(n => !deletedNotifs.includes(n.id));
        }

        function markAsSeen(id) {
            const seenNotifs = JSON.parse(localStorage.getItem('seen_notifications') || '[]');
            if (!seenNotifs.includes(id)) {
                seenNotifs.push(id);
                localStorage.setItem('seen_notifications', JSON.stringify(seenNotifs));
            }
        }

        function showNotification(notif) {
            const container = document.getElementById('notification-container');
            const div = document.createElement('div');
            div.className = `notification ${notif.type}`;
            div.innerHTML = `<strong>${escapeHtml(notif.title)}</strong><br>${escapeHtml(notif.message)}`;
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.5s';
                setTimeout(() => div.remove(), 500);
            }, 5000);
        }

        function openNotificationsModal() {
            const modal = document.getElementById('notifications-modal');
            const list = document.getElementById('notif-list');
            modal.style.display = 'flex';
            list.innerHTML = '';

            const activeNotifs = getActiveNotifications();

            if (activeNotifs.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#666;">No hay notificaciones.</p>';
                return;
            }

            activeNotifs.forEach(notif => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                item.innerHTML = `
                    <button class="btn-del" onclick="deleteNotification('${notif.id}')" aria-label="Eliminar notificación">&times;</button>
                    <span class="notif-title">${escapeHtml(notif.title)}</span>
                    <span class="notif-msg">${escapeHtml(notif.message)}</span>
                    <span class="notif-date">${new Date(notif.date).toLocaleString()}</span>
                `;
                list.appendChild(item);
            });
        }

        function closeNotificationsModal() {
            document.getElementById('notifications-modal').style.display = 'none';
        }

        function deleteNotification(id) {
            const deletedNotifs = JSON.parse(localStorage.getItem('deleted_notifications') || '[]');
            if (!deletedNotifs.includes(id)) {
                deletedNotifs.push(id);
                localStorage.setItem('deleted_notifications', JSON.stringify(deletedNotifs));
            }
            openNotificationsModal();
        }

        function clearAllNotifications() {
            const allIds = allNotifications.map(n => n.id);
            localStorage.setItem('deleted_notifications', JSON.stringify(allIds));
            openNotificationsModal();
        }

        window.addEventListener('scroll', () => {
            document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
        }, { passive: true });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
