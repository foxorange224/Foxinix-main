<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxWeb | Descargas</title>
    <meta name="description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb. Tu portal de descargas confiable y rápido.">
    <meta name="keywords" content="descargas, software, juegos, aplicaciones, FoxWeb">
    <link rel="canonical" href="https://foxweb.qzz.io">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/assets/icon.webp" type="image/webp">
    <link rel="apple-touch-icon" href="/assets/icon.webp">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://foxweb.qzz.io">
    <meta property="og:title" content="FoxWeb | Descargas">
    <meta property="og:description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb.">
    <meta property="og:image" content="https://foxweb.qzz.io/assets/logo.webp">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://foxweb.qzz.io">
    <meta property="twitter:title" content="FoxWeb | Descargas">
    <meta property="twitter:description" content="Descarga los mejores recursos, aplicaciones y juegos en FoxWeb.">
    <meta property="twitter:image" content="https://foxweb.qzz.io/assets/logo.webp">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        header a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
        }

        header p {
            margin: 0;
        }

        .nav-categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 0;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .cat-btn.active {
            background: #444;
            border-color: #666;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .card:hover {
            border-color: #555;
        }

        .card img {
            width: 84px;
            height: 84px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 18px;
        }

        .badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }

        .badge {
            background: #333;
            color: #ccc;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .btn-download {
            background: white;
            color: black;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Description Overlay */
        #description-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 3000;
            overflow-y: auto;
            color: white;
            font-family: sans-serif;
        }

        .desc-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        .desc-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .desc-header img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .desc-header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .desc-separator {
            height: 1px;
            background: #333;
            width: 100%;
            margin: 20px 0;
        }

        .desc-body {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ccc;
        }

        .desc-md-content {
            text-align: left;
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-top: 30px;
        }

        .close-desc {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            z-index: 3100;
        }

        /* Notifications Modal */
        #notifications-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }

        .notif-modal-content {
            background: #111;
            border: 1px solid #333;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .notif-modal-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .notif-list {
            padding: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .notif-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            transition: background 0.2s;
        }

        .notif-item:hover {
            background: #222;
        }

        .notif-item .notif-title {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #fff;
        }

        .notif-item .notif-msg {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            display: block;
        }

        .notif-item .notif-date {
            font-size: 0.75rem;
            color: #666;
        }

        .notif-item .btn-del {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .notif-modal-footer {
            padding: 15px;
            border-top: 1px solid #333;
            text-align: right;
        }

        .btn-clear-all {
            background: #8C0700;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Notification Styles */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification {
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 4px;
            border-left: 5px solid #fff;
            min-width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        .notification.info { border-left-color: #3498db; }
        .notification.success { border-left-color: #2ecc71; }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        body.no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">
            <img src="/assets/logo.webp" height="80">
        </a>
        <a href="/about"><p>Acerca de</p></a>
        <button class="cat-btn" onclick="openNotificationsModal()" style="margin-left: 10px;">
            <i class="fa-solid fa-bell"></i> Notificaciones
        </button>
    </header>

    <div class="nav-categories" id="category-nav">
        <!-- Categories will be injected here -->
    </div>

    <div class="content-grid" id="content-grid">
        <!-- Content cards will be injected here -->
    </div>

    <div id="notification-container"></div>

    <div id="notifications-modal">
        <div class="notif-modal-content">
            <div class="notif-modal-header">
                <h2>Notificaciones</h2>
                <button class="close-desc" style="position: static; padding: 5px 10px;" onclick="closeNotificationsModal()">&times;</button>
            </div>
            <div class="notif-list" id="notif-list">
                <!-- Notifications injected here -->
            </div>
            <div class="notif-modal-footer">
                <button class="btn-clear-all" onclick="clearAllNotifications()">Borrar Todas</button>
            </div>
        </div>
    </div>

    <div id="description-overlay">
        <button class="close-desc" onclick="closeDescription()">Cerrar</button>
        <div class="desc-container" id="desc-container">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        const DB_URL = 'https://database.foxweb.qzz.io';
        let allData = {};
        let allNotifications = [];

        async function init() {
            try {
                const response = await fetch(`${DB_URL}/data.json`);
                allData = await response.json();
                
                setupCategories();
                
                const hash = window.location.hash.substring(1);
                const categories = Object.keys(allData);
                const targetCat = categories.find(c => c.toLowerCase() === hash.toLowerCase());
                
                if (targetCat) {
                    switchCategory(targetCat);
                } else {
                    switchCategory(categories[0]);
                }
                
                setupNotifications();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        function setupCategories() {
            const nav = document.getElementById('category-nav');
            const categories = Object.keys(allData);
            
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.id = `btn-${cat}`;
                btn.textContent = `${cat.charAt(0).toUpperCase() + cat.slice(1)} (${allData[cat].length})`;
                btn.onclick = () => {
                    window.location.hash = cat;
                };
                nav.appendChild(btn);
            });
        }

        function switchCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${cat}`);
            if (activeBtn) activeBtn.classList.add('active');
            renderCategory(cat);
        }

        window.onhashchange = () => {
            const hash = window.location.hash.substring(1);
            const categories = Object.keys(allData);
            const targetCat = categories.find(c => c.toLowerCase() === hash.toLowerCase());
            if (targetCat) {
                switchCategory(targetCat);
            }
        };

        function renderCategory(cat) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            const items = allData[cat] || [];
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const badgesHtml = item.badges.map(b => `<span class="badge">${b}</span>`).join('');
                const iconUrl = `${DB_URL}/icons/${item.id}.webp`;
                
                card.innerHTML = `
                    <img src="${iconUrl}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <div class="badges">${badgesHtml}</div>
                `;
                card.onclick = () => openDescription(item);
                grid.appendChild(card);
            });
        }

        async function openDescription(item) {
            const overlay = document.getElementById('description-overlay');
            const container = document.getElementById('desc-container');
            const iconUrl = `${DB_URL}/icons/${item.id}.webp`;
            
            document.body.classList.add('no-scroll');
            overlay.style.display = 'block';
            container.innerHTML = 'Cargando...';

            try {
                const mdResponse = await fetch(`${DB_URL}/mds/${item.id}.md`);
                let mdText = 'No hay contenido adicional disponible.';
                if (mdResponse.ok) {
                    mdText = await mdResponse.text();
                }

                let renderedMd = mdText.replace(/\[boton de descarga, color=([^,]+), icono=([^,]+), enlace=([^,]+), title="([^"]+)"\]/g, (match, color, icon, link, title) => {
                    return `<a href="${link}" style="background-color: ${color}; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin: 10px 0; font-weight: bold;"><i class="${icon}"></i> ${title}</a>`;
                });

                renderedMd = renderedMd
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/\n/g, '<br>');

                const downloadButton = item.enlace && item.enlace !== '#' 
                    ? `<a href="#" class="btn-download" 
                       onclick="handleDownload(event, '${item.enlace}')" 
                       style="font-size: 1.2rem; padding: 15px 30px;">
                       Descargar ahora
                    </a>` 
                    : '';

                container.innerHTML = `
                    <div class="desc-header">
                        <img src="${iconUrl}" alt="${item.name}">
                        <h1>${item.name}</h1>
                    </div>
                    <div class="desc-separator"></div>
                    <div class="desc-body">
                        ${item.info}
                    </div>
                    ${downloadButton}
                    <div class="desc-md-content">
                        ${renderedMd}
                    </div>
                `;
            } catch (e) {
                console.error('Error loading description:', e);
                container.innerHTML = 'Error al cargar la descripción.';
            }
        }

        function closeDescription() {
            document.getElementById('description-overlay').style.display = 'none';
            document.body.classList.remove('no-scroll');
        }

        function handleDownload(e, enlace) {
            e.preventDefault();
            if (enlace && enlace !== '#') {
                window.open(enlace, '_blank');
            }
        }

        async function setupNotifications() {
            try {
                const response = await fetch(`${DB_URL}/notifications.json`);
                const data = await response.json();
                allNotifications = data.notifications;
                
                const activeNotifs = getActiveNotifications();
                const seenNotifs = JSON.parse(localStorage.getItem('seen_notifications') || '[]');
                
                activeNotifs.forEach((notif, index) => {
                    if (!seenNotifs.includes(notif.id)) {
                        setTimeout(() => {
                            showNotification(notif);
                            markAsSeen(notif.id);
                        }, index * 3000);
                    }
                });
            } catch (e) {
                console.error('Error loading notifications:', e);
            }
        }

        function getActiveNotifications() {
            const deletedNotifs = JSON.parse(localStorage.getItem('deleted_notifications') || '[]');
            return allNotifications.filter(n => !deletedNotifs.includes(n.id));
        }

        function markAsSeen(id) {
            const seenNotifs = JSON.parse(localStorage.getItem('seen_notifications') || '[]');
            if (!seenNotifs.includes(id)) {
                seenNotifs.push(id);
                localStorage.setItem('seen_notifications', JSON.stringify(seenNotifs));
            }
        }

        function showNotification(notif) {
            const container = document.getElementById('notification-container');
            const div = document.createElement('div');
            div.className = `notification ${notif.type}`;
            div.innerHTML = `<strong>${notif.title}</strong><br>${notif.message}`;
            
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.5s';
                setTimeout(() => div.remove(), 500);
            }, 5000);
        }

        function openNotificationsModal() {
            const modal = document.getElementById('notifications-modal');
            const list = document.getElementById('notif-list');
            
            modal.style.display = 'flex';
            list.innerHTML = '';

            const activeNotifs = getActiveNotifications();

            if (activeNotifs.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#666;">No hay notificaciones.</p>';
                return;
            }

            activeNotifs.forEach(notif => {
                const item = document.createElement('div');
                item.className = 'notif-item';
                item.innerHTML = `
                    <button class="btn-del" onclick="deleteNotification('${notif.id}')">&times;</button>
                    <span class="notif-title">${notif.title}</span>
                    <span class="notif-msg">${notif.message}</span>
                    <span class="notif-date">${new Date(notif.date).toLocaleString()}</span>
                `;
                list.appendChild(item);
            });
        }

        function closeNotificationsModal() {
            document.getElementById('notifications-modal').style.display = 'none';
        }

        function deleteNotification(id) {
            const deletedNotifs = JSON.parse(localStorage.getItem('deleted_notifications') || '[]');
            if (!deletedNotifs.includes(id)) {
                deletedNotifs.push(id);
                localStorage.setItem('deleted_notifications', JSON.stringify(deletedNotifs));
            }
            openNotificationsModal();
        }

        function clearAllNotifications() {
            const deletedNotifs = JSON.parse(localStorage.getItem('deleted_notifications') || '[]');
            const allIds = allNotifications.map(n => n.id);
            const updatedDeleted = [...new Set([...deletedNotifs, ...allIds])];
            localStorage.setItem('deleted_notifications', JSON.stringify(updatedDeleted));
            
            openNotificationsModal();
        }
        
        init();
    </script>
</body>
</html>
