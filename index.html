<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxWeb | Descargas</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        header a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
        }

        header p {
            margin: 0;
        }

        .nav-categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 0;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .cat-btn.active {
            background: #444;
            border-color: #666;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .card:hover {
            border-color: #555;
        }

        .card img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 18px;
        }

        .badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }

        .badge {
            background: #333;
            color: #ccc;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .btn-download {
            background: white;
            color: black;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Description Overlay */
        #description-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 3000;
            overflow-y: auto;
            color: white;
            font-family: sans-serif;
        }

        .desc-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        .desc-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .desc-header img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .desc-header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .desc-separator {
            height: 1px;
            background: #333;
            width: 100%;
            margin: 20px 0;
        }

        .desc-body {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ccc;
        }

        .desc-md-content {
            text-align: left;
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-top: 30px;
        }

        .close-desc {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            z-index: 3100;
        }


        /* Notification Styles */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }


        .notification {
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 4px;
            border-left: 5px solid #fff;
            min-width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        .notification.info { border-left-color: #3498db; }
        .notification.success { border-left-color: #2ecc71; }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <header>
        <a href="/">
            <img src="/assets/logo.webp" height="80">
        </a>
        <a href="/about"><p>Acerca de</p></a>
    </header>

    <div class="nav-categories" id="category-nav">
        <!-- Categories will be injected here -->
    </div>

    <div class="content-grid" id="content-grid">
        <!-- Content cards will be injected here -->
    </div>

    <div id="notification-container"></div>

    <div id="description-overlay">
        <button class="close-desc" onclick="closeDescription()">Cerrar</button>
        <div class="desc-container" id="desc-container">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        const DB_URL = 'https://database.foxweb.qzz.io';
        let allData = {};

        async function init() {
            try {
                const response = await fetch(`${DB_URL}/data.json`);
                allData = await response.json();
                
                setupCategories();
                renderCategory(Object.keys(allData)[0]);
                setupNotifications();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        function setupCategories() {
            const nav = document.getElementById('category-nav');
            const categories = Object.keys(allData);
            
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (index === 0 ? ' active' : '');
                btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(cat) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            const items = allData[cat] || [];
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const badgesHtml = item.badges.map(b => `<span class="badge">${b}</span>`).join('');
                const iconUrl = `${DB_URL}/icons/${item.id}.webp`;
                
                card.innerHTML = `
                    <img src="${iconUrl}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <div class="badges">${badgesHtml}</div>
                `;
                card.onclick = () => openDescription(item);
                grid.appendChild(card);
            });
        }

        async function openDescription(item) {
            const overlay = document.getElementById('description-overlay');
            const container = document.getElementById('desc-container');
            const iconUrl = `${DB_URL}/icons/${item.id}.webp`;
            
            overlay.style.display = 'block';
            container.innerHTML = 'Cargando...';

            try {
                const mdResponse = await fetch(`${DB_URL}/mds/${item.id}.md`);
                let mdText = 'No hay contenido adicional disponible.';
                if (mdResponse.ok) {
                    mdText = await mdResponse.text();
                }

                // Parse custom buttons: [boton de descarga, color=#hex, icono=fa-xxx, enlace=url, title="text"]
                const parsedMd = mdText.replace(/\[boton de descarga, color=([^,]+), icono=([^,]+), enlace=([^,]+), title="([^"]+)"\]/g, (match, color, icon, link, title) => {
                    return `<a href="${link}" style="background-color: ${color}; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin: 10px 0; font-weight: bold;"><i class="${icon}"></i> ${title}</a>`;
                });

                const downloadButton = item.enlace && item.enlace !== '#' 
                    ? `<a href="#" class="btn-download" 
                       onclick="handleDownload(event, '${item.enlace}')" 
                       style="font-size: 1.2rem; padding: 15px 30px;">
                       Descargar ahora
                    </a>` 
                    : '';

                container.innerHTML = `
                    <div class="desc-header">
                        <img src="${iconUrl}" alt="${item.name}">
                        <h1>${item.name}</h1>
                    </div>
                    <div class="desc-separator"></div>
                    <div class="desc-body">
                        ${item.info}
                    </div>
                    ${downloadButton}
                    <div class="desc-md-content">
                        ${parsedMd.replace(/\\n/g, '<br>')}
                    </div>
                `;
            } catch (e) {
                console.error('Error loading description:', e);
                container.innerHTML = 'Error al cargar la descripción.';
            }
        }

        function closeDescription() {
            document.getElementById('description-overlay').style.display = 'none';
        }

        function handleDownload(e, enlace) {
            e.preventDefault();
            if (enlace && enlace !== '#') {
                window.open(enlace, '_blank');
            }
        }

        async function setupNotifications() {
            try {
                const response = await fetch(`${DB_URL}/notifications.json`);
                const data = await response.json();
                
                data.notifications.forEach((notif, index) => {
                    setTimeout(() => {
                        showNotification(notif);
                    }, index * 3000);
                });
            } catch (e) {
                console.error('Error loading notifications:', e);
            }
        }

        function showNotification(notif) {
            const container = document.getElementById('notification-container');
            const div = document.createElement('div');
            div.className = `notification ${notif.type}`;
            div.innerHTML = `<strong>${notif.title}</strong><br>${notif.message}`;
            
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.5s';
                setTimeout(() => div.remove(), 500);
            }, 5000);
        }

        // Global function for modal closing (called from modals.html)
        
        init();
    </script>
</body>
</html>
