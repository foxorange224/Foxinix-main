<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <script>(function() { var e = localStorage.getItem("foxweb_theme") || "light"; document.documentElement.setAttribute("data-theme", e) })()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Configurar FoxWeb</title>
    <meta name="description" content="FoxWeb - Configuración">
    <meta name="theme-color" content="#FF4500">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #b34700;
            --primary-hover: #993800;
            --primary-light: rgba(179, 71, 0, 0.15);
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --bg-tab: #f1f3f5;
            --text-main: #212529;
            --text-secondary: #666;
            --text-dim: #6c757d;
            --border: #dee2e6;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.15);
            --radius-md: 6px;
            --radius-lg: 8px;
        }
        [data-theme=dark] {
            --bg-body: #0a0a0a;
            --bg-card: #121212;
            --bg-tab: #1a1a1a;
            --text-main: #f0f0f0;
            --text-secondary: #aaa;
            --text-dim: #888;
            --border: #333;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: inter, -apple-system, BlinkMacSystemFont, segoe ui, Roboto, sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(179, 71, 0, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(179, 71, 0, 0.1) 0%, transparent 30%),
                linear-gradient(135deg, var(--bg-body) 0%, var(--bg-tab) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        @keyframes float-icon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .config-container {
            max-width: 420px;
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 28px 24px;
            transition: background-color 0.3s ease;
            backdrop-filter: blur(10px);
            background-color: rgba(var(--bg-card-rgb), 0.8);
        }
        .config-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .config-icon {
            font-size: 40px;
            color: var(--primary);
            margin-bottom: 12px;
            display: inline-block;
            animation: float-icon 3s ease-in-out infinite;
        }
        .config-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        .config-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .config-section {
            margin-bottom: 20px;
        }
        .config-label {
            display: block;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .theme-toggle {
            display: flex;
            background: var(--bg-tab);
            border-radius: var(--radius-md);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .theme-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .theme-btn.active {
            background: var(--primary);
            color: #fff;
        }
        .theme-btn:not(.active):hover {
            background: var(--primary-light);
        }
        .tabs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tab-checkbox {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .tab-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-tab);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .tab-label:hover {
            border-color: var(--primary);
        }
        .tab-checkbox:checked + .tab-label {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .tab-label i {
            font-size: 0.8rem;
        }
        .action-btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .action-btn:hover {
            background: var(--primary-hover);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s ease;
        }
        .btn-back:hover {
            color: var(--primary);
        }
    </style>
</head>

    <body>
        <div class="config-container">
            <button class="btn-back" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
            <div class="config-header">
                <div class="config-icon"><i class="fas fa-face-laugh"></i></div>
                <h1 class="config-title">Configurar FoxWeb</h1>
                <p class="config-subtitle">Elige cómo quieres ver el sitio</p>
            </div>

        <div class="config-section">
            <span class="config-label">Tu nombre</span>
            <input type="text" id="username" placeholder="Ingresa tu nombre" style="width:100%;padding:12px 16px;background:var(--bg-tab);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-main);font-size:1rem;">
        </div>

        <div class="config-section">
            <span class="config-label">Tema</span>
            <div class="theme-toggle">
                <button type="button" class="theme-btn" id="themeBtnLight" onclick="setTheme('light')">
                    <i class="fas fa-sun"></i> Claro
                </button>
                <button type="button" class="theme-btn" id="themeBtnDark" onclick="setTheme('dark')">
                    <i class="fas fa-moon"></i> Oscuro
                </button>
            </div>
        </div>

        <div class="config-section">
            <span class="config-label">Pestañas a mostrar</span>
            <div class="tabs-grid">
                <input type="checkbox" id="tabProgramas" class="tab-checkbox" value="Programas" checked>
                <label for="tabProgramas" class="tab-label"><i class="fas fa-laptop-code"></i> Programas</label>
                
                <input type="checkbox" id="tabSistemas" class="tab-checkbox" value="Sistemas" checked>
                <label for="tabSistemas" class="tab-label"><i class="fas fa-server"></i> Sistemas</label>
                
                <input type="checkbox" id="tabJuegos" class="tab-checkbox" value="Juegos" checked>
                <label for="tabJuegos" class="tab-label"><i class="fas fa-gamepad"></i> Juegos</label>
                
                <input type="checkbox" id="tabExtras" class="tab-checkbox" value="Extras" checked>
                <label for="tabExtras" class="tab-label"><i class="fas fa-toolbox"></i> Extras</label>
                
                <input type="checkbox" id="tabAPKs" class="tab-checkbox" value="APKs" checked>
                <label for="tabAPKs" class="tab-label"><i class="fas fa-mobile-alt"></i> APKs</label>
            </div>
        </div>

        <div class="config-section">
            <span class="config-label">Vista de tarjetas</span>
            <div class="theme-toggle">
                <button type="button" class="theme-btn" id="btnCards" onclick="setView('cards')">
                    <i class="fas fa-th-large"></i> Tarjetas
                </button>
                <button type="button" class="theme-btn" id="btnCompact" onclick="setView('compact')">
                    <i class="fas fa-list"></i> Compacta
                </button>
            </div>
        </div>

        <div class="config-section">
            <span class="config-label">Datos</span>
            <div id="dataStats" style="margin-bottom:10px;color:var(--text-secondary);font-size:0.85rem;">0 favoritos · 0 en historial</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button type="button" class="theme-btn" onclick="exportData()" style="flex:1;">
                    <i class="fas fa-download"></i> Exportar
                </button>
                <button type="button" class="theme-btn" onclick="document.getElementById('importFile').click()" style="flex:1;">
                    <i class="fas fa-upload"></i> Importar
                </button>
                <button type="button" class="theme-btn" onclick="clearData()" style="background:#dc3545;color:#fff;flex:1;">
                    <i class="fas fa-trash"></i> Borrar
                </button>
            </div>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this)">
        </div>

        <button type="button" class="action-btn" onclick="saveAndContinue()">
            <i class="fas fa-check"></i> Guardar
        </button>
    </div>

    <script>
        // Variables
        var selectedTheme = localStorage.getItem('foxweb_theme') || 'light';
        var selectedView = localStorage.getItem('foxweb_view') || 'cards';
        
        // Apply theme immediately
        document.documentElement.setAttribute('data-theme', selectedTheme);
        
        // Theme functions
        window.setTheme = function(theme) {
            selectedTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('foxweb_theme', theme);
            updateThemeButtons();
        };

        window.setView = function(view) {
            selectedView = view;
            localStorage.setItem('foxweb_view', view);
            updateViewButtons();
        };

        function updateThemeButtons() {
            var btnLight = document.getElementById('themeBtnLight');
            var btnDark = document.getElementById('themeBtnDark');
            if (btnLight) btnLight.classList.toggle('active', selectedTheme === 'light');
            if (btnDark) btnDark.classList.toggle('active', selectedTheme === 'dark');
        }

        function updateViewButtons() {
            var btnCards = document.getElementById('btnCards');
            var btnCompact = document.getElementById('btnCompact');
            if (btnCards) btnCards.classList.toggle('active', selectedView === 'cards');
            if (btnCompact) btnCompact.classList.toggle('active', selectedView === 'compact');
        }

        function exportData() {
            var data = {
                username: localStorage.getItem('foxweb_username'),
                favorites: localStorage.getItem('foxweb_favorites'),
                history: localStorage.getItem('foxweb_download_history'),
                stats: localStorage.getItem('foxweb_stats'),
                theme: localStorage.getItem('foxweb_theme'),
                view: localStorage.getItem('foxweb_view'),
                notifications: localStorage.getItem('foxweb_notifications'),
                categories: localStorage.getItem('foxweb_categories'),
                exportDate: new Date().toISOString()
            };
            var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'foxweb-data-' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('Datos exportados');
        }

        function importData(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data.favorites) localStorage.setItem('foxweb_favorites', data.favorites);
                    if (data.history) localStorage.setItem('foxweb_download_history', data.history);
                    if (data.stats) localStorage.setItem('foxweb_stats', data.stats);
                    if (data.username) localStorage.setItem('foxweb_username', data.username);
                    if (data.theme) localStorage.setItem('foxweb_theme', data.theme);
                    if (data.view) localStorage.setItem('foxweb_view', data.view);
                    if (data.notifications) localStorage.setItem('foxweb_notifications', data.notifications);
                    if (data.categories) localStorage.setItem('foxweb_categories', data.categories);
                    alert('Datos importados');
                    location.reload();
                } catch (err) {
                    alert('Error al importar');
                }
            };
            reader.readAsText(file);
        }

        function clearData() {
            if (confirm('¿Borrar todos los datos? Esto no se puede deshacer.')) {
                var keys = ['foxweb_favorites', 'foxweb_download_history', 'foxweb_stats', 'foxweb_notifications', 'foxweb_username', 'foxweb_theme', 'foxweb_view', 'foxweb_categories', 'foxweb_configured', 'foxweb_first_visit'];
                keys.forEach(function(k) { localStorage.removeItem(k); });
                window.location.href = '/welcome';
            }
        }

        window.saveAndContinue = function() {
            var selectedTabs = [];
            document.querySelectorAll('.tab-checkbox:checked').forEach(function(cb) {
                selectedTabs.push(cb.value);
            });
            
            if (selectedTabs.length === 0) {
                alert('Selecciona al menos una pestaña');
                return;
            }
            
            localStorage.setItem('foxweb_theme', selectedTheme);
            localStorage.setItem('foxweb_view', selectedView);
            
            // Clear per-tab view preferences so global preference takes effect
            var tabIds = ['Programas', 'Sistemas', 'Juegos', 'Extras', 'APKs'];
            tabIds.forEach(function(tabId) {
                localStorage.removeItem('foxweb_view_mode_' + tabId);
            });
            
            var username = document.getElementById('username').value.trim();
            if (username) {
                localStorage.setItem('foxweb_username', username);
            }
            
            localStorage.setItem('foxweb_configured', 'true');
            localStorage.setItem('foxweb_first_visit', 'false');
            localStorage.setItem('foxweb_categories', JSON.stringify(selectedTabs));
            
            window.location.href = '/downloads';
        };

        document.addEventListener('DOMContentLoaded', function() {
            updateThemeButtons();
            updateViewButtons();
            
            // Pre-fill username
            var savedUsername = localStorage.getItem('foxweb_username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
            }
            
            // Show data info
            try {
                var saved = localStorage.getItem('foxweb_categories');
                if (saved) {
                    var savedTabs = JSON.parse(saved);
                    document.querySelectorAll('.tab-checkbox').forEach(function(cb) {
                        cb.checked = savedTabs.indexOf(cb.value) !== -1;
                    });
                }
            } catch (e) {}
            
            // Update data stats display
            updateDataStats();
        });
        
        function updateDataStats() {
            var favs = JSON.parse(localStorage.getItem('foxweb_favorites') || '[]');
            var hist = JSON.parse(localStorage.getItem('foxweb_download_history') || '[]');
            var statsEl = document.getElementById('dataStats');
            if (statsEl) {
                statsEl.textContent = favs.length + ' favoritos · ' + hist.length + ' en historial';
            }
        }
    </script>
</body>
</html>
